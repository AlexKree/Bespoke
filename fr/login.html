  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css?v=3"/>
</head>
<body>

        <button class="navbar-toggle" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <div class="navbar-menu">
        <a data-nav class="navlink" href="index.html">Accueil</a>

          <a class="" href="../en/login.html">EN</a>
        </div>
        </div>
      </nav>
    </div>
  </div>
</header>

<main class="section authPage">
  <div class="container">
    <div class="authCard card pad-lg">

      <div class="authTabBar">
        <button class="authTabBtn active" id="tabLoginBtn" type="button">Connexion</button>
        <button class="authTabBtn" id="tabSignupBtn" type="button">Créer un compte</button>
      </div>

      <!-- Login panel -->
      <div id="panelLogin" class="authPanel">
        <h2>Se connecter</h2>
        <div id="loginError" class="authMsg error" style="display:none"></div>
        <form id="loginForm" class="form" novalidate>
          <div class="formGroup">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" class="input" type="email" required autocomplete="email" placeholder="votre@email.com"/>
          </div>
          <div class="formGroup">
            <label for="loginPassword">Mot de passe</label>
            <input id="loginPassword" class="input" type="password" required autocomplete="current-password" placeholder="••••••••"/>
          </div>
          <button class="btn primary" type="submit" id="loginSubmit">Se connecter</button>
        </form>
        <p class="mini" style="margin-top:14px;text-align:center">
          Pas encore de compte ? <button class="linkBtn" id="goSignup" type="button">Créer un compte →</button>
        </p>
      </div>

      <!-- Signup panel -->
      <div id="panelSignup" class="authPanel" style="display:none">
        <h2>Créer un compte</h2>
        <div id="signupError" class="authMsg error" style="display:none"></div>
        <div id="signupSuccess" class="authMsg success" style="display:none"></div>
        <form id="signupForm" class="form" novalidate>
          <div class="formGroup">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" class="input" type="email" required autocomplete="email" placeholder="votre@email.com"/>
          </div>
          <div class="formGroup">
            <label for="signupPassword">Mot de passe <span class="mini">(min. 8 caractères)</span></label>
            <input id="signupPassword" class="input" type="password" required autocomplete="new-password" placeholder="••••••••" minlength="8"/>
          </div>
          <div class="formGroup">
            <label for="signupPasswordConfirm">Confirmer le mot de passe</label>
            <input id="signupPasswordConfirm" class="input" type="password" required autocomplete="new-password" placeholder="••••••••"/>
          </div>
          <div class="formGroup">
            <label for="signupAccountType">Type de compte</label>
            <select id="signupAccountType" class="select">
              <option value="Particulier">Particulier</option>
              <option value="Entreprise">Entreprise</option>
            </select>
          </div>
          <button class="btn primary" type="submit" id="signupSubmit">Créer mon compte</button>
        </form>
        <p class="mini" style="margin-top:14px;text-align:center">
          Déjà inscrit ? <button class="linkBtn" id="goLogin" type="button">Se connecter →</button>
        </p>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="sep"></div>
    <div class="footerSocial" style="text-align:center;margin:20px 0;">
      <div class="footerTitle" style="margin-bottom:12px;">Suivez-nous</div>
      <div style="display:flex;gap:16px;justify-content:center;align-items:center;">
        <a href="https://x.com/TheBespokeCar" target="_blank" rel="noopener noreferrer" aria-label="Twitter" style="color:var(--gold);font-size:24px;transition:transform 0.2s;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:block;">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>

        <a href="https://www.linkedin.com/company/112966970" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" style="color:var(--gold);font-size:24px;transition:transform 0.2s;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:block;">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

<script src="../assets/site.js"></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  if (params.get('tab') === 'signup') showTab('signup');

  function showTab(tab) {
    var isLogin = tab !== 'signup';
    document.getElementById('panelLogin').style.display = isLogin ? '' : 'none';
    document.getElementById('panelSignup').style.display = isLogin ? 'none' : '';
    document.getElementById('tabLoginBtn').classList.toggle('active', isLogin);
    document.getElementById('tabSignupBtn').classList.toggle('active', !isLogin);
  }

  document.getElementById('tabLoginBtn').addEventListener('click', function () { showTab('login'); });
  document.getElementById('tabSignupBtn').addEventListener('click', function () { showTab('signup'); });
  document.getElementById('goSignup').addEventListener('click', function () { showTab('signup'); });
  document.getElementById('goLogin').addEventListener('click', function () { showTab('login'); });

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var btn = document.getElementById('loginSubmit');
    var errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Connexion…';
    try {
      var res = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'login',
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        }),
        credentials: 'same-origin'
      });
      var data = await res.json();
      if (data.ok) {
        window.location.href = '/fr/stock.html';
      } else {
        errEl.textContent = data.error || 'Erreur de connexion';
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    } catch (err) {
      errEl.textContent = 'Erreur réseau. Réessayez.';
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });

  document.getElementById('signupForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var btn = document.getElementById('signupSubmit');
    var errEl = document.getElementById('signupError');
    var sucEl = document.getElementById('signupSuccess');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    var password = document.getElementById('signupPassword').value;
    var confirm = document.getElementById('signupPasswordConfirm').value;
    if (password !== confirm) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.';
      errEl.style.display = '';
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
      errEl.style.display = '';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Création…';
    try {
      var res = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'register',
          email: document.getElementById('signupEmail').value,
          password: password,
          account_type: document.getElementById('signupAccountType').value
        }),
        credentials: 'same-origin'
      });
      var data = await res.json();
      if (data.ok) {
        document.getElementById('signupForm').style.display = 'none';
        sucEl.textContent = 'Vérifiez votre email pour activer votre compte.';
        sucEl.style.display = '';
      } else {
        errEl.textContent = data.error || 'Erreur lors de la création du compte';
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    } catch (err) {
      errEl.textContent = 'Erreur réseau. Réessayez.';
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
    }
  });
})();
</script>
</body>
</html>
